server {
    listen 443 ssl;
    server_name subscription.example.invalid;

    # Replace the placeholder with the real service token during deployment.
    location ~ ^/REPLACE_SERVICE_TOKEN/sub/[^/]+/[^/]+/clash(?:/(?:company|home))?$ {
        access_log off;
        proxy_pass http://127.0.0.1:25500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, max-age=300, must-revalidate" always;
    }

    location / {
        return 404;
    }
}

ruleset=🎯 常规公网,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🎯 常规公网,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 常规公网,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=🎯 常规公网,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=🎯 常规公网,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 常规公网,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
ruleset=🎯 常规公网,[]GEOIP,CN
ruleset=🐟 Final兜底,[]FINAL

; 中性策略组。DIRECT 只表示 home 的自然出口，company 编译时会替换成公司 SOCKS5。
custom_proxy_group=🚀 节点选择`select`[]🥇 手动选择1`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他`[]DIRECT
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🥇 手动选择1`select`.*
custom_proxy_group=Ⓜ️ 微软云盘`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他
custom_proxy_group=☁️ iCloud`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他
custom_proxy_group=🎬 EMBY`select`[]🚀 节点选择`[]DIRECT`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他`.*
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他`[]DIRECT`.*
custom_proxy_group=📢 谷歌FCM`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他
custom_proxy_group=📲 谷歌Play`select`[]🇺🇲 ‍美国自动`[]🚀 节点选择`[]🇭🇰 香港自动`[]🎏 ‍其他`[]DIRECT`.*
custom_proxy_group=🤖 GPT`select`[]🇺🇲 ‍美国自动`[]🚀 节点选择`[]🇭🇰 香港自动`[]🎏 ‍其他`[]DIRECT`.*
custom_proxy_group=👨‍💻 GitHub`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他`.*
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他`[]DIRECT`.*
custom_proxy_group=📺 哔哩哔哩港澳台`select`[]🇭🇰 香港自动`[]🎏 ‍其他`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🎯 常规公网`select`[]DIRECT
custom_proxy_group=🐟 Final兜底`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`[]🇭🇰 香港自动`[]🇺🇲 ‍美国自动`[]🎏 ‍其他

custom_proxy_group=🇭🇰 香港自动`url-test`🇭🇰(?!.*(?!🇨🇳)[🇦-🇿]{2})`https://i.ytimg.com/generate_204`300,,100
custom_proxy_group=🇺🇲 ‍美国自动`url-test`(🇺🇸|🇺🇲)(?!.*[🇦-🇿]{2})`https://i.ytimg.com/generate_204`300,,300
custom_proxy_group=🎏 ‍其他`url-test`^(?!.*(🇨🇳|🇭🇰|🇲🇴|🇹🇼|🇸🇬|🇯🇵|🇺🇸|🇺🇲)(?!.*[🇦-🇿]{2}))`https://i.ytimg.com/generate_204`300,,100

enable_rule_generator=true
overwrite_original_rules=true
skip_failed_links=true

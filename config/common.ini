[custom]
; 公共规则模板只描述流量类别，company/home 的出口差异由服务端转换。

; 永远直连的局域网规则必须位于所有公网规则之前。
ruleset=DIRECT,clash-classic:https://raw.githubusercontent.com/siakitem/clash_rules/master/rules/lan.yaml
ruleset=DIRECT,[]GEOIP,LAN

; 自定义公网规则。
ruleset=🎯 常规公网,clash-classic:https://raw.githubusercontent.com/siakitem/clash_rules/master/rules/direct.yaml
ruleset=🚀 节点选择,clash-classic:https://raw.githubusercontent.com/siakitem/clash_rules/master/rules/proxy.yaml

; 业务规则。
ruleset=📺 哔哩哔哩港澳台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/BilibiliHMT.list
ruleset=🎬 EMBY,clash-classic:https://raw.githubusercontent.com/cutethotw/ClashRule/main/Rule/Emby.yaml
ruleset=🎬 EMBY,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Emby/Emby.yaml
ruleset=🎬 EMBY,https://raw.githubusercontent.com/Nowat995/emby/main/AddEmbyList.list
ruleset=👨‍💻 GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/wuyaos/OpenClash-Rules/main/rules/ProxyMedia.list
ruleset=🤖 GPT,https://raw.githubusercontent.com/wuyaos/OpenClash-Rules/main/rules/AI.list
ruleset=🤖 GPT,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt
ruleset=Ⓜ️ 微软云盘,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=📲 谷歌Play,https://raw.githubusercontent.com/wuyaos/OpenClash-Rules/main/rules/googleplay.list
ruleset=🍎 Apple,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/apple.txt
ruleset=🍎 Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=☁️ iCloud,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/icloud.txt
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyListChina.list

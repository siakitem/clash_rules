; 通用代理规则。private.txt 不属于公网代理规则，已从这里移除。
ruleset=🚀 节点选择,https://raw.githubusercontent.com/wuyaos/OpenClash-Rules/main/rules/proxy.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt
ruleset=🚀 节点选择,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt

; 公网直连类规则在 company 中映射到 SOCKS5，在 home 中映射到 DIRECT。
ruleset=🎯 常规公网,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 常规公网,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
ruleset=🎯 常规公网,https://raw.githubusercontent.com/wuyaos/OpenClash-Rules/main/rules/PT.list
ruleset=🎯 常规公网,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt
